{% extends "admin/admin_base.html" %}

{% block title %}
{{ article.title }}
{% endblock title %}

{% block css %}
<link href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/monokai.min.css" rel="stylesheet"/>
<link href='/css/article_view.css' rel='stylesheet'/>
<style>
    pre {
        padding: 0px;
    }
</style>
{% endblock css %}

{% block body %}
<header>
    <div class="img">
        <img src="/images/img_12.webp" class="img-fluid rounded"/><br>
        <p class="text-end">--- 摄于 2017 年 9 月 藏川线前段</p>
    </div>
</header>
<div class="container">
  <div class="row justify-content-center">
    <div id="article-content" class="col-lg-10 col-md-11 col-12" data-id="{{ article.id }}" data-view-mode="admin">
      {{ article.content | safe }}
    </div>
  </div>
</div>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-lg-10 col-md-11 col-12">
      <div class="article-navigation">
        <a class="article-nav-button article-nav-button-wide article-nav-previous is-disabled" href="javascript:void(0)" aria-disabled="true" aria-label="上一篇">
          <span class="article-nav-label">&larr; 上一篇</span>
          <span class="article-nav-title">暂无更早文章</span>
        </a>
        <a class="article-nav-button article-nav-button-center article-nav-catalog" href="/admin/list">
          <span class="article-nav-label">目录</span>
          <span class="article-nav-title">管理列表</span>
        </a>
        <a class="article-nav-button article-nav-button-wide article-nav-next is-disabled" href="javascript:void(0)" aria-disabled="true" aria-label="下一篇">
          <span class="article-nav-label">下一篇 &rarr;</span>
          <span class="article-nav-title">暂无更新文章</span>
        </a>
      </div>
    </div>
  </div>
</div>

{% endblock body %}

{% block script %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/rust.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/go.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/c.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/cpp.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/bash.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/sql.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/yaml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/dockerfile.min.js"></script>
<script src="/js/arttemplate.js"></script>
<script src="/js/article_view/article_navigation.js"></script>
<script>
    "use strict";
    $(function () {
        var $article = $("#article-content");
        var id = $article.attr("data-id");
        hightlight($("pre code"));
        loadArticleNavigation($article);
        $.getJSON("/api/v1/article/admin/view?id=" + id, function (result) {
            $("#article-content")
                .append("<blockquote class='float-end'><h5 class='post-meta'>Last Modified:</h5>" +
                    "<p class='float-end post-meta'>" + moment.utc(result.data.modify_time).local().format("YYYY-MM-DD HH:mm:ss") +
                    "</p></blockquote>");
            var tags = {data: []};

            $.each(result.data.tags, function (index, value) {
                if (value !== null) {
                    tags.data.push([result.data.tags_id[index], value])
                }
            });
            var html = template("tpl-tag-list", tags);
            $("#article-content").children().first().after(html)
        });
    });

    function hightlight($doms) {
        $doms.each(function(i, block) {
            hljs.highlightElement(block);
        });
    }
</script>
<script id="tpl-tag-list" type="text/html">
    {% raw %}
    <div style="margin-bottom: 10px;">
        {{each data}}
        <span class='badge bg-info text-dark' tag-id={{ $value[0] }}><i class='bi bi-tags' style='margin-right: 5px;'></i>{{ $value[1] }}</span>
        {{/each}}
    </div>
    {% endraw %}
</script>
{% endblock script%}
